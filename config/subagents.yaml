# Subagent definitions — loaded by app/core/tools.py at startup.
# Add new agent capabilities by adding entries here — no code changes needed.
# Each tool specifies: name, description, parameters (OpenAI function schema),
# handler (dotted module path), and risk_level (low/medium/high).

subagents:
  - name: search_agent
    description: "Search the web for current information"
    tools:
      - name: web_search
        description: "Search the web using Brave Search API for current information, weather, news, prices, etc."
        parameters:
          type: object
          properties:
            query:
              type: string
              description: "The search query"
          required: ["query"]
        handler: app.tasks.web_search.handle_web_search
        risk_level: low

  - name: email_agent
    description: "Read and send emails via Gmail"
    tools:
      - name: read_emails
        description: "Read recent emails from the user's Gmail inbox"
        parameters:
          type: object
          properties:
            max_results:
              type: integer
              description: "Number of emails to fetch (default 5)"
              default: 5
          required: []
        handler: connections.tools.gmail.read_emails
        risk_level: low
      - name: send_email
        description: "Send an email on behalf of the user via Gmail"
        parameters:
          type: object
          properties:
            to:
              type: string
              description: "Recipient email address"
            subject:
              type: string
              description: "Email subject line"
            body:
              type: string
              description: "Email body text"
          required: ["to", "subject", "body"]
        handler: connections.tools.gmail.send_email
        risk_level: high

  - name: calendar_agent
    description: "Read and manage Google Calendar events"
    tools:
      - name: list_events
        description: "List upcoming calendar events"
        parameters:
          type: object
          properties:
            max_results:
              type: integer
              description: "Number of events to fetch (default 10)"
              default: 10
          required: []
        handler: connections.tools.calendar.list_events
        risk_level: low
      - name: create_event
        description: "Create a new calendar event"
        parameters:
          type: object
          properties:
            summary:
              type: string
              description: "Event title"
            start_time:
              type: string
              description: "Start time in ISO 8601 format"
            end_time:
              type: string
              description: "End time in ISO 8601 format"
            description:
              type: string
              description: "Event description (optional)"
          required: ["summary", "start_time", "end_time"]
        handler: connections.tools.calendar.create_event
        risk_level: medium

  - name: task_agent
    description: "Manage user tasks, reminders, and scheduled notifications"
    tools:
      - name: create_reminder
        description: >-
          Use this tool whenever the user wants something done, remembered, or
          communicated at a specific time — whether relative ('in 5 minutes',
          'in an hour') or explicit ('tonight', 'tomorrow at 3pm', 'next Monday').
          This includes: 'remind me to...', 'text me a joke in 2 mins',
          'let me know when...', 'set a timer for...', or any request that
          involves a future action or notification. The system will extract the
          task description and schedule delivery at the right time. Always use
          this tool — do not refuse or say you cannot set reminders.
        parameters:
          type: object
          properties:
            title:
              type: string
              description: "What the user wants to be reminded about — use their words"
            due_at:
              type: string
              description: "When to trigger the reminder, in ISO 8601 format. For relative times like 'in 5 minutes', compute from the current time provided in the system prompt. If unsure, leave null and the system will parse it."
            action_type:
              type: string
              enum: ["notify", "execute"]
              description: >-
                'notify' if the user wants to be reminded to do something themselves
                (e.g. 'remind me to call mom'). 'execute' if the user wants the
                assistant to perform an action at the scheduled time (e.g. 'tell me
                a joke in 2 mins', 'send me the weather tonight'). Defaults to 'notify'.
          required: ["title"]
        handler: app.tasks.reminder.handle_reminder
        risk_level: low
      - name: list_tasks
        description: "List the user's current tasks, reminders, and scheduled items"
        parameters:
          type: object
          properties:
            status:
              type: string
              description: "Filter by status: active, completed, all (default: active)"
              default: "active"
          required: []
        handler: app.tasks.recall.handle_recall
        risk_level: low
