services:
  postgres:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_DB: assistant
      POSTGRES_USER: operator
      POSTGRES_PASSWORD: operator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U operator -d assistant"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
      - ./alembic:/app/alembic
      - sqlite_data:/app/data
      # dashboard/dist is baked into the image — do NOT mount .:/app or it gets overridden
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://operator:operator@postgres:5432/assistant
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  worker:
    build: .
    command: python scripts/run_worker.py
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
      - sqlite_data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://operator:operator@postgres:5432/assistant
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  connections:
    build:
      context: ./connections
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - DASHBOARD_URL=http://localhost:8000
    volumes:
      - ./connections:/app
    restart: unless-stopped

  scheduler:
    build: .
    command: python scripts/run_scheduler.py
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
      - ./config:/app/config
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://operator:operator@postgres:5432/assistant
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  sqlite_data:
  postgres_data:
