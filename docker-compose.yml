version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - sqlite_data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./data/assistant.db
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    command: python scripts/run_worker.py
    volumes:
      - .:/app
      - sqlite_data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./data/assistant.db
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  connections:
    build:
      context: ./connections
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./connections:/app
    restart: unless-stopped

volumes:
  redis_data:
  sqlite_data:
